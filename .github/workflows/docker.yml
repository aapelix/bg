name: Build & Push

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Login GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build & Push API
        run: |
          docker build -t ghcr.io/${{ github.repository }}-api:latest ./api
          docker push ghcr.io/${{ github.repository }}-api:latest

      - name: Build & Push Client
        run: |
          docker build -t ghcr.io/${{ github.repository }}-client:latest ./front
          docker push ghcr.io/${{ github.repository }}-client:latest
